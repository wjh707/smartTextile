<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术前沿 - 智能纺织品情报系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="data_smart_textile_data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }
        .navbar { background: linear-gradient(135deg, #1565C0, #00897B); padding: 0 30px; display: flex; align-items: center; height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar .brand { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-right: 40px; white-space: nowrap; }
        .navbar .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .navbar .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all .2s; }
        .navbar .nav-links a:hover, .navbar .nav-links a.active { background: rgba(255,255,255,0.18); color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .page-title { font-size: 28px; color: #1565C0; margin-bottom: 6px; }
        .page-subtitle { font-size: 14px; color: #888; margin-bottom: 24px; }
        .back-link { display: inline-block; margin-bottom: 16px; color: #1565C0; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 30px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 22px 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-top: 3px solid #1565C0; transition: transform .2s, box-shadow .2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(21,101,192,0.12); }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #1565C0; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .stat-card:nth-child(2) { border-top-color: #00897B; }
        .stat-card:nth-child(2) .num { color: #00897B; }
        .stat-card:nth-child(3) { border-top-color: #e67e22; }
        .stat-card:nth-child(3) .num { color: #e67e22; }
        .stat-card:nth-child(4) { border-top-color: #8e44ad; }
        .stat-card:nth-child(4) .num { color: #8e44ad; }

        /* Charts grid */
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .chart-box { background: #fff; border-radius: 12px; padding: 18px 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .chart-box h3 { font-size: 15px; color: #333; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #1565C0; }
        .chart-box .chart { width: 100%; height: 280px; }

        /* Filter + list */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
        .filter-bar select, .filter-bar input { padding: 7px 12px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 13px; background: #fff; outline: none; }
        .filter-bar select:focus, .filter-bar input:focus { border-color: #1565C0; }
        .filter-bar .filter-label { font-size: 13px; color: #666; font-weight: 500; }

        .section-subtitle { font-size: 18px; color: #333; margin: 0 0 14px; padding-left: 10px; border-left: 3px solid #e67e22; display: flex; align-items: center; gap: 10px; }
        .section-subtitle .count-badge { font-size: 12px; background: #e3f2fd; color: #1565C0; padding: 2px 10px; border-radius: 20px; font-weight: 500; }

        .list-wrap { display: flex; flex-direction: column; gap: 14px; }
        .tech-card { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: box-shadow .2s; border-left: 3px solid #e67e22; }
        .tech-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .tech-card .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
        .tech-card .title-text { font-size: 15px; color: #333; line-height: 1.5; font-weight: 600; flex: 1; min-width: 0; }
        .tech-card .date { font-size: 12px; color: #999; white-space: nowrap; }
        .tech-card .summary { font-size: 13px; color: #666; line-height: 1.6; margin: 6px 0 8px; }
        .tech-card .meta-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: #e3f2fd; color: #1565C0; }
        .tag.green { background: #e0f2f1; color: #00897B; }
        .tag.orange { background: #fff3e0; color: #e67e22; }
        .tag.purple { background: #f3e5f5; color: #8e44ad; }
        .tag.red { background: #ffebee; color: #c62828; }

        /* Smart level colors */
        .tag.level-ultra { background: #fce4ec; color: #c62828; }
        .tag.level-active { background: #e8f5e9; color: #2e7d32; }
        .tag.level-passive { background: #e0e0e0; color: #616161; }

        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
        .empty-msg { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .error-msg { text-align: center; padding: 40px; color: #c62828; background: #ffebee; border-radius: 12px; margin: 20px; }

        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .navbar { flex-wrap: wrap; height: auto; padding: 10px 16px; }
            .navbar .brand { margin-bottom: 6px; font-size: 16px; }
            .navbar .nav-links a { padding: 6px 12px; font-size: 13px; }
            .page-title { font-size: 22px; }
            .chart-box .chart { height: 240px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card .num { font-size: 26px; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 20px 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand">🧵 智能纺织品情报系统</div>
    <div class="nav-links">
        <a href="index.html">🏠 首页总览</a>
        <a href="market.html">🌍 市场动态</a>
        <a href="policy.html">📜 政策法规</a>
        <a href="tech.html" class="active">🔬 技术前沿</a>
        <a href="research.html">🎓 科研动态</a>
        <a href="standards.html">📋 行规标准</a>
    </div>
</nav>
<div class="container">
    <a href="index.html" class="back-link">← 返回总览</a>
    <h1 class="page-title">🔬 技术前沿</h1>
    <p class="page-subtitle">聚焦智能纺织品六大技术方向的最新突破与创新 · 共 <span id="totalCount">--</span> 条记录</p>

    <!-- Stats Cards -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="num" id="statTotal">--</div><div class="label">📦 技术总数</div></div>
        <div class="stat-card"><div class="num" id="statTech">--</div><div class="label">🔬 技术方向</div></div>
        <div class="stat-card"><div class="num" id="statScene">--</div><div class="label">🎯 覆盖场景</div></div>
        <div class="stat-card"><div class="num" id="statRegion">--</div><div class="label">🌍 覆盖国家</div></div>
    </div>

    <!-- Charts Grid -->
    <div class="charts-grid">
        <div class="chart-box">
            <h3>技术方向分布</h3>
            <div id="chartTechPie" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3>应用场景分布</h3>
            <div id="chartSceneBar" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3>年份趋势</h3>
            <div id="chartYearLine" class="chart"></div>
        </div>
        <div class="chart-box">
            <h3>智能等级分布</h3>
            <div id="chartLevelPie" class="chart"></div>
        </div>
    </div>

    <!-- Filter + List -->
    <div class="section-subtitle">
        📄 技术突破详情
        <span class="count-badge" id="filteredCount">--</span>
    </div>

    <div class="filter-bar">
        <span class="filter-label">筛选：</span>
        <select id="filterTech">
            <option value="all">全部技术方向</option>
            <option value="flexible-sensor">柔性传感</option>
            <option value="conductive-fiber">导电纤维</option>
            <option value="energy-harvesting">能量采集</option>
            <option value="embedded-circuit">嵌入式电路</option>
            <option value="integration">系统集成</option>
            <option value="communication">通信互联</option>
        </select>
        <select id="filterScene">
            <option value="all">全部应用场景</option>
            <option value="healthcare">医疗健康</option>
            <option value="wearable-computing">可穿戴计算</option>
            <option value="industrial-safety">工业安全</option>
            <option value="sports-fitness">运动健身</option>
            <option value="fashion-entertainment">时尚娱乐</option>
            <option value="smart-home">智能家居</option>
            <option value="military-defense">军事国防</option>
        </select>
        <select id="filterYear">
            <option value="all">全部年份</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
        </select>
        <input type="text" id="filterSearch" placeholder="🔍 搜索标题/摘要..." oninput="renderList()">
    </div>

    <div class="list-wrap" id="listWrap">
        <div class="empty-msg">加载中...</div>
    </div>
</div>
<div class="footer">数据更新时间：<span id="updateDate">--</span> | 智能纺织品情报系统 · 仅供内部参考</div>
<script>
(function() {
    var techNameMap = {
        'conductive-fiber': '导电纤维', 'flexible-sensor': '柔性传感器',
        'energy-harvesting': '能量采集', 'embedded-circuit': '嵌入式电路',
        'communication': '通信互联', 'integration': '系统集成'
    };
    var sceneNameMap = {
        'healthcare': '医疗健康', 'sports-fitness': '运动健身',
        'military-defense': '军事国防', 'smart-home': '智能家居',
        'fashion-entertainment': '时尚娱乐', 'industrial-safety': '工业安全',
        'wearable-computing': '可穿戴计算'
    };
    var techColorMap = {
        'conductive-fiber': '#1565C0', 'flexible-sensor': '#00897B',
        'energy-harvesting': '#e67e22', 'embedded-circuit': '#8e44ad',
        'communication': '#27ae60', 'integration': '#e53935'
    };
    var levelNameMap = {
        'ultra': '超智能', 'active': '主动式', 'passive': '被动式'
    };
    var levelColorMap = {
        'ultra': '#c62828', 'active': '#2e7d32', 'passive': '#757575'
    };

    var allRecords = [];
    var filteredRecords = [];

    // Get unique regions counting
    function getRegions(records) {
        var set = new Set();
        records.forEach(function(r) { if (r.region) set.add(r.region); });
        return set.size;
    }

    function getTechSet(records) {
        var set = new Set();
        records.forEach(function(r) { if (r.tech_tags) r.tech_tags.forEach(function(t) { set.add(t); }); });
        return set;
    }

    function getSceneSet(records) {
        var set = new Set();
        records.forEach(function(r) { if (r.scene_tags) r.scene_tags.forEach(function(s) { set.add(s); }); });
        return set;
    }

    function countTech(records) {
        var map = {};
        var keys = Object.keys(techNameMap);
        keys.forEach(function(k) { map[k] = 0; });
        records.forEach(function(r) {
            if (r.tech_tags) r.tech_tags.forEach(function(t) {
                if (map[t] !== undefined) map[t]++;
            });
        });
        return map;
    }

    function countScene(records) {
        var map = {};
        var keys = Object.keys(sceneNameMap);
        keys.forEach(function(k) { map[k] = 0; });
        records.forEach(function(r) {
            if (r.scene_tags) r.scene_tags.forEach(function(s) {
                if (map[s] !== undefined) map[s]++;
            });
        });
        return map;
    }

    function countYears(records) {
        var map = {};
        records.forEach(function(r) {
            if (r.date) {
                var y = r.date.substring(0, 4);
                map[y] = (map[y] || 0) + 1;
            }
        });
        // Ensure 2023-2026
        ['2023','2024','2025','2026'].forEach(function(y) { if (!map[y]) map[y] = 0; });
        return map;
    }

    function countLevels(records) {
        var map = {};
        records.forEach(function(r) {
            var lv = r.smart_level || 'unknown';
            map[lv] = (map[lv] || 0) + 1;
        });
        return map;
    }

    function initCharts(records) {
        // Chart 1: Tech Direction Pie
        var techCount = countTech(records);
        var techPieData = Object.keys(techNameMap).map(function(k) {
            return { name: techNameMap[k], value: techCount[k] || 0 };
        });
        var chart1 = echarts.init(document.getElementById('chartTechPie'));
        chart1.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'center', textStyle: { fontSize: 11 } },
            series: [{
                type: 'pie', radius: ['30%', '70%'], center: ['55%', '50%'],
                label: { show: false },
                emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
                data: techPieData,
                itemStyle: {
                    color: function(p) {
                        var colors = ['#1565C0','#00897B','#e67e22','#8e44ad','#27ae60','#e53935'];
                        return colors[p.dataIndex] || '#999';
                    }
                }
            }]
        });

        // Chart 2: Scene Bar
        var sceneCount = countScene(records);
        var sceneData = Object.keys(sceneNameMap).map(function(k) {
            return { name: sceneNameMap[k], value: sceneCount[k] || 0 };
        });
        var chart2 = echarts.init(document.getElementById('chartSceneBar'));
        chart2.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '8%', right: '4%', bottom: '12%', top: '6%', containLabel: true },
            xAxis: { type: 'category', data: sceneData.map(function(d) { return d.name; }),
                axisLabel: { fontSize: 10, interval: 0, rotate: 25 } },
            yAxis: { type: 'value', name: '记录数', minInterval: 1 },
            series: [{
                type: 'bar', data: sceneData.map(function(d) { return d.value; }),
                barWidth: '45%',
                itemStyle: {
                    borderRadius: [4, 4, 0, 0],
                    color: '#00897B'
                },
                label: { show: true, position: 'top', fontWeight: 'bold', fontSize: 11 }
            }]
        });

        // Chart 3: Year Line
        var yearCount = countYears(records);
        var yearOrder = ['2023','2024','2025','2026'];
        var yearData = yearOrder.map(function(y) { return yearCount[y] || 0; });
        var chart3 = echarts.init(document.getElementById('chartYearLine'));
        chart3.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '4%', right: '4%', bottom: '10%', top: '10%', containLabel: true },
            xAxis: { type: 'category', data: yearOrder, axisLabel: { fontSize: 13 } },
            yAxis: { type: 'value', name: '记录数', minInterval: 1 },
            series: [{
                type: 'line', data: yearData,
                smooth: true,
                lineStyle: { width: 3, color: '#1565C0' },
                itemStyle: { color: '#1565C0' },
                areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                    colorStops: [{ offset: 0, color: 'rgba(21,101,192,0.3)' }, { offset: 1, color: 'rgba(21,101,192,0.02)' }] } },
                label: { show: true, position: 'top', fontWeight: 'bold', fontSize: 13 }
            }]
        });

        // Chart 4: Smart Level Pie
        var levelCount = countLevels(records);
        var levelPieData = Object.keys(levelCount).map(function(k) {
            return { name: levelNameMap[k] || k, value: levelCount[k] };
        });
        var chart4 = echarts.init(document.getElementById('chartLevelPie'));
        chart4.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left', top: 'center', textStyle: { fontSize: 11 } },
            series: [{
                type: 'pie', radius: ['30%', '70%'], center: ['55%', '50%'],
                label: { show: false },
                emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
                data: levelPieData,
                itemStyle: {
                    color: function(p) {
                        var colors = ['#c62828','#2e7d32','#757575'];
                        return colors[p.dataIndex] || '#999';
                    }
                }
            }]
        });

        // Resize all charts on window resize
        window.addEventListener('resize', function() {
            chart1.resize(); chart2.resize(); chart3.resize(); chart4.resize();
        });
    }

    window.renderList = function() {
        var techFilter = document.getElementById('filterTech').value;
        var sceneFilter = document.getElementById('filterScene').value;
        var yearFilter = document.getElementById('filterYear').value;
        var searchText = document.getElementById('filterSearch').value.toLowerCase().trim();

        filteredRecords = allRecords.filter(function(r) {
            if (techFilter !== 'all' && (!r.tech_tags || r.tech_tags.indexOf(techFilter) === -1)) return false;
            if (sceneFilter !== 'all' && (!r.scene_tags || r.scene_tags.indexOf(sceneFilter) === -1)) return false;
            if (yearFilter !== 'all') {
                var y = r.date ? r.date.substring(0,4) : '';
                if (y !== yearFilter) return false;
            }
            if (searchText) {
                var title = (r.title || '').toLowerCase();
                var summary = (r.summary || '').toLowerCase();
                if (title.indexOf(searchText) === -1 && summary.indexOf(searchText) === -1) return false;
            }
            return true;
        });

        document.getElementById('filteredCount').textContent = filteredRecords.length + ' 条';

        var listWrap = document.getElementById('listWrap');
        if (filteredRecords.length === 0) {
            listWrap.innerHTML = '<div class="empty-msg">暂无匹配记录</div>';
            return;
        }

        var html = '';
        filteredRecords.forEach(function(r) {
            html += '<div class="tech-card">';
            html += '<div class="title-row">';
            html += '<span class="title-text">' + (r.title || '') + '</span>';
            html += '<span class="date">📅 ' + (r.date || '') + '</span>';
            html += '</div>';
            if (r.summary) {
                html += '<div class="summary">' + r.summary + '</div>';
            }
            html += '<div class="meta-row">';
            if (r.tech_tags) {
                r.tech_tags.forEach(function(t) {
                    var label = techNameMap[t] || t;
                    var cls = '';
                    if (t === 'flexible-sensor') cls = 'green';
                    else if (t === 'energy-harvesting') cls = 'orange';
                    else if (t === 'embedded-circuit') cls = 'purple';
                    else if (t === 'communication') cls = 'red';
                    html += '<span class="tag ' + cls + '">' + label + '</span>';
                });
            }
            if (r.scene_tags) {
                r.scene_tags.forEach(function(s) {
                    var label = sceneNameMap[s] || s;
                    html += '<span class="tag green">' + label + '</span>';
                });
            }
            // Smart level tag
            if (r.smart_level) {
                var lvName = levelNameMap[r.smart_level] || r.smart_level;
                html += '<span class="tag level-' + r.smart_level + '">' + lvName + '</span>';
            }
            html += '</div>';
            html += '</div>';
        });
        listWrap.innerHTML = html;
    };

    // Bind filter events
    function bindFilters() {
        var sel = ['filterTech', 'filterScene', 'filterYear'];
        sel.forEach(function(id) {
            document.getElementById(id).addEventListener('change', window.renderList);
        });
    }

    function init() {
        var data = window.SMART_TEXTILE_DATA;
        if (!data || !data.records) {
            document.getElementById('listWrap').innerHTML = '<div class="error-msg">❌ 数据加载失败</div>';
            return;
        }

        // All records (no event_type filter - use all 84 records)
        allRecords = data.records.slice();

        // Sort by date descending
        allRecords.sort(function(a, b) {
            return (b.date || '').localeCompare(a.date || '');
        });

        filteredRecords = allRecords.slice();

        // Update stats
        document.getElementById('totalCount').textContent = allRecords.length;
        document.getElementById('statTotal').textContent = allRecords.length;
        document.getElementById('statTech').textContent = getTechSet(allRecords).size;
        document.getElementById('statScene').textContent = getSceneSet(allRecords).size;
        document.getElementById('statRegion').textContent = getRegions(allRecords).size;

        // Init charts (using all records)
        initCharts(allRecords);

        // Bind filters
        bindFilters();

        // Render list
        window.renderList();

        // Update footer date
        document.getElementById('updateDate').textContent = new Date().toISOString().slice(0, 10);
    }

    if (typeof window.SMART_TEXTILE_DATA !== 'undefined') {
        init();
    } else {
        var ci = setInterval(function() {
            if (typeof window.SMART_TEXTILE_DATA !== 'undefined') {
                clearInterval(ci);
                init();
            }
        }, 100);
        setTimeout(function() { clearInterval(ci); }, 5000);
    }
})();
</script>
</body>
</html>
