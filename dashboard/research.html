<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研动态 - 智能纺织品情报系统</title>
    <script src="data_papers.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }
        .navbar { background: linear-gradient(135deg, #1565C0, #00897B); padding: 0 30px; display: flex; align-items: center; height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar .brand { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-right: 40px; white-space: nowrap; }
        .navbar .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .navbar .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all .2s; }
        .navbar .nav-links a:hover, .navbar .nav-links a.active { background: rgba(255,255,255,0.18); color: #fff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
        .page-title { font-size: 28px; color: #1565C0; margin-bottom: 6px; }
        .page-subtitle { font-size: 14px; color: #888; margin-bottom: 20px; }
        .back-link { display: inline-block; margin-bottom: 16px; color: #1565C0; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .list-wrap { display: flex; flex-direction: column; gap: 14px; }
        .paper-card { background: #fff; border-radius: 12px; padding: 20px 22px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: box-shadow .2s; border-left: 3px solid #8e44ad; }
        .paper-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .paper-card h3 { font-size: 16px; color: #333; margin-bottom: 8px; line-height: 1.5; }
        .paper-card .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: #e3f2fd; color: #1565C0; }
        .tag.purple { background: #f3e5f5; color: #8e44ad; }
        .tag.green { background: #e0f2f1; color: #00897B; }
        .tag.orange { background: #fff3e0; color: #e67e22; }
        .paper-card .journal-info { font-size: 13px; color: #8e44ad; margin-bottom: 6px; font-weight: 500; }
        .paper-card .abstract { font-size: 13px; color: #666; line-height: 1.6; }
        .paper-card .year { font-size: 12px; color: #999; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #eee; }
        .empty-msg { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .error-msg { text-align: center; padding: 40px; color: #c62828; background: #ffebee; border-radius: 12px; margin: 20px; }
        @media (max-width: 768px) {
            .navbar { flex-wrap: wrap; height: auto; padding: 10px 16px; }
            .navbar .brand { margin-bottom: 6px; font-size: 16px; }
            .navbar .nav-links a { padding: 6px 12px; font-size: 13px; }
            .page-title { font-size: 22px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand">🧵 智能纺织品情报系统</div>
    <div class="nav-links">
        <a href="index.html">🏠 首页总览</a>
        <a href="market.html">🌍 市场动态</a>
        <a href="policy.html">📜 政策法规</a>
        <a href="tech.html">🔬 技术前沿</a>
        <a href="research.html" class="active">🎓 科研动态</a>
        <a href="standards.html">📋 行规标准</a>
    </div>
</nav>
<div class="container">
    <a href="index.html" class="back-link">← 返回总览</a>
    <h1 class="page-title">🎓 科研动态</h1>
    <p class="page-subtitle">收录智能纺织品领域学术论文与研究报告，跟踪全球科研最新进展</p>

    <div class="list-wrap" id="listWrap">
        <div class="empty-msg">加载中...</div>
    </div>
</div>
<div class="footer">数据更新时间：<span id="updateDate">--</span> | 智能纺织品情报系统 · 仅供内部参考</div>
<script>
(function() {
    function truncate(text, maxLen) {
        if (!text) return '';
        return text.length > maxLen ? text.substring(0, maxLen) + '...' : text;
    }

    function init() {
        var data = window.PAPERS_DATA;
        if (!data || !data.records) {
            document.getElementById('listWrap').innerHTML = '<div class="error-msg">❌ 数据加载失败</div>';
            return;
        }

        // Sort by year descending, then by title
        var records = data.records.slice().sort(function(a, b) {
            if ((b.year || 0) !== (a.year || 0)) return (b.year || 0) - (a.year || 0);
            return (a.title || '').localeCompare(b.title || '');
        });

        var listWrap = document.getElementById('listWrap');
        if (records.length === 0) {
            listWrap.innerHTML = '<div class="empty-msg">暂无论文数据</div>';
            document.getElementById('updateDate').textContent = new Date().toISOString().slice(0, 10);
            return;
        }

        var html = '';
        records.forEach(function(r) {
            var abstractShort = truncate(r.abstract, 80);
            var authorsStr = '';
            if (r.authors) {
                if (Array.isArray(r.authors)) {
                    authorsStr = r.authors.slice(0, 3).join('; ');
                    if (r.authors.length > 3) authorsStr += ' 等';
                } else {
                    authorsStr = String(r.authors);
                }
            }

            html += '<div class="paper-card">';
            html += '<h3>' + (r.title || '') + '</h3>';
            html += '<div class="meta-row">';
            if (r.journal) html += '<span class="tag purple">' + r.journal + '</span>';
            if (r.year) html += '<span class="tag orange">' + r.year + '年</span>';
            if (authorsStr) html += '<span class="tag green">' + authorsStr + '</span>';
            html += '</div>';
            if (abstractShort) html += '<div class="abstract">' + abstractShort + '</div>';
            html += '</div>';
        });
        listWrap.innerHTML = html;
        document.getElementById('updateDate').textContent = new Date().toISOString().slice(0, 10);
    }

    if (typeof window.PAPERS_DATA !== 'undefined') {
        init();
    } else {
        var ci = setInterval(function() {
            if (typeof window.PAPERS_DATA !== 'undefined') {
                clearInterval(ci);
                init();
            }
        }, 100);
        setTimeout(function() { clearInterval(ci); }, 5000);
    }
})();
</script>
</body>
</html>
