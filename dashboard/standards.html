<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行规标准 - 智能纺织品情报系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="data_standards.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }
        .navbar { background: linear-gradient(135deg, #1565C0, #00897B); padding: 0 30px; display: flex; align-items: center; height: 64px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar .brand { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: 1px; margin-right: 40px; white-space: nowrap; }
        .navbar .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
        .navbar .nav-links a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: all .2s; }
        .navbar .nav-links a:hover, .navbar .nav-links a.active { background: rgba(255,255,255,0.18); color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
        .page-header .left { flex: 1; }
        .page-header h1 { font-size: 28px; color: #1565C0; margin-bottom: 4px; }
        .page-header .subtitle { font-size: 14px; color: #888; }
        .page-header .back-link { color: #1565C0; text-decoration: none; font-size: 14px; white-space: nowrap; margin-left: 12px; }
        .page-header .back-link:hover { text-decoration: underline; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 12px; padding: 20px 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-top: 3px solid #1565C0; transition: transform .2s, box-shadow .2s; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(21,101,192,0.12); }
        .stat-card .num { font-size: 30px; font-weight: 700; color: #1565C0; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .stat-card:nth-child(2) { border-top-color: #00897B; }
        .stat-card:nth-child(2) .num { color: #00897B; }
        .stat-card:nth-child(3) { border-top-color: #e67e22; }
        .stat-card:nth-child(3) .num { color: #e67e22; }
        .stat-card:nth-child(4) { border-top-color: #8e44ad; }
        .stat-card:nth-child(4) .num { color: #8e44ad; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px; }
        .chart-box { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chart-box .chart-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 10px; padding-left: 10px; border-left: 3px solid #1565C0; }
        .chart-box .chart-wrap { width: 100%; height: 280px; }
        .section-title { font-size: 20px; color: #333; margin-bottom: 16px; padding-left: 12px; border-left: 4px solid #1565C0; }
        .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
        .filter-bar label { font-size: 13px; color: #666; }
        .filter-bar select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; background: #fff; cursor: pointer; }
        .filter-bar select:focus { border-color: #1565C0; }
        .filter-bar .count-info { font-size: 13px; color: #888; margin-left: auto; }
        .list-wrap { display: flex; flex-direction: column; gap: 14px; }
        .std-card { background: #fff; border-radius: 12px; padding: 20px 22px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: box-shadow .2s; border-left: 3px solid #27ae60; }
        .std-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .std-card h3 { font-size: 16px; color: #333; margin-bottom: 6px; line-height: 1.5; }
        .std-card .code { font-size: 13px; color: #27ae60; font-weight: 500; margin-bottom: 8px; }
        .std-card .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; background: #e3f2fd; color: #1565C0; }
        .tag.green { background: #e0f2f1; color: #00897B; }
        .tag.orange { background: #fff3e0; color: #e67e22; }
        .tag.purple { background: #f3e5f5; color: #8e44ad; }
        .tag.teal { background: #e0f2f1; color: #00695c; }
        .std-card .summary { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 8px; }
        .std-card .bottom-row { display: flex; justify-content: space-between; align-items: center; }
        .std-card .bottom-row .date { font-size: 12px; color: #999; }
        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .status-implemented { background: #e8f5e9; color: #2e7d32; }
        .status-pending { background: #fff8e1; color: #f57f17; }
        .status-draft { background: #f3e5f5; color: #7b1fa2; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; border-top: 1px solid #eee; margin-top: 40px; }
        .empty-msg { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .error-msg { text-align: center; padding: 40px; color: #c62828; background: #ffebee; border-radius: 12px; margin: 20px; }
        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 768px) {
            .navbar { flex-wrap: wrap; height: auto; padding: 10px 16px; }
            .navbar .brand { margin-bottom: 6px; font-size: 16px; }
            .navbar .nav-links a { padding: 6px 12px; font-size: 13px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .page-header h1 { font-size: 22px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
            .chart-box .chart-wrap { height: 240px; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card .num { font-size: 24px; }
            .container { padding: 20px 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="brand">🧵 智能纺织品情报系统</div>
    <div class="nav-links">
        <a href="index.html">🏠 首页总览</a>
        <a href="market.html">🌍 市场动态</a>
        <a href="policy.html">📜 政策法规</a>
        <a href="tech.html">🔬 技术前沿</a>
        <a href="research.html">🎓 科研动态</a>
        <a href="standards.html" class="active">📋 行规标准</a>
    </div>
</nav>
<div class="container">
    <div class="page-header">
        <div class="left">
            <h1>📋 行规标准</h1>
            <p class="subtitle">跟踪国内外智能纺织品行业标准、技术规范、安全要求及合规动态</p>
        </div>
        <a href="index.html" class="back-link">← 返回总览</a>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="num" id="statTotal">--</div><div class="label">标准总数</div></div>
        <div class="stat-card"><div class="num" id="statInternational">--</div><div class="label">国际标准</div></div>
        <div class="stat-card"><div class="num" id="statImplemented">--</div><div class="label">已实施</div></div>
        <div class="stat-card"><div class="num" id="statNew">--</div><div class="label">2025+2026 新增</div></div>
    </div>

    <!-- ECharts 图表 -->
    <div class="charts-grid" id="chartsGrid">
        <div class="chart-box">
            <div class="chart-title">标准状态分布</div>
            <div class="chart-wrap" id="chartStatus"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">类型分布</div>
            <div class="chart-wrap" id="chartType"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">年份趋势</div>
            <div class="chart-wrap" id="chartYear"></div>
        </div>
        <div class="chart-box">
            <div class="chart-title">关联技术分布</div>
            <div class="chart-wrap" id="chartTech"></div>
        </div>
    </div>

    <!-- 筛选 + 列表 -->
    <h2 class="section-title">📄 标准列表</h2>
    <div class="filter-bar">
        <label for="statusFilter">状态筛选：</label>
        <select id="statusFilter">
            <option value="all">全部</option>
            <option value="implemented">已实施</option>
            <option value="published">已发布</option>
            <option value="draft">草案</option>
        </select>
        <span class="count-info" id="countInfo">共 0 条</span>
    </div>
    <div class="list-wrap" id="listWrap">
        <div class="empty-msg">加载中...</div>
    </div>
</div>
<div class="footer">数据更新时间：<span id="updateDate">--</span> | 智能纺织品情报系统 · 仅供内部参考</div>
<script>
(function() {
    var typeMap = {
        'national': '国家标准',
        'international': '国际标准',
        'industry': '行业标准',
        'local': '地方标准',
        'group': '团体标准'
    };
    var statusMap = {
        'implemented': '已实施',
        'published': '已发布',
        'draft': '草案'
    };
    var statusColorMap = {
        'implemented': '#2e7d32',
        'published': '#f57f17',
        'draft': '#7b1fa2'
    };
    var typeColorMap = {
        'national': '#1565C0',
        'international': '#00897B',
        'industry': '#e67e22',
        'group': '#8e44ad'
    };
    var allRecords = [];

    function init() {
        var data = window.STANDARDS_DATA;
        if (!data || !data.standards) {
            document.getElementById('listWrap').innerHTML = '<div class="error-msg">❌ 数据加载失败</div>';
            return;
        }

        allRecords = data.standards.slice().sort(function(a, b) {
            return (b.date || '').localeCompare(a.date || '');
        });

        document.getElementById('updateDate').textContent = data.updatedAt || new Date().toISOString().slice(0, 10);

        updateStats(allRecords);
        renderCharts(allRecords);
        renderList(allRecords);

        // Filter change
        document.getElementById('statusFilter').addEventListener('change', function() {
            var val = this.value;
            var filtered = val === 'all' ? allRecords : allRecords.filter(function(r) { return r.status === val; });
            renderList(filtered);
        });
    }

    function updateStats(records) {
        var total = records.length;
        var intl = records.filter(function(r) { return r.type === 'international'; }).length;
        var implemented = records.filter(function(r) { return r.status === 'implemented'; }).length;
        var newCount = records.filter(function(r) {
            var y = (r.date || '').slice(0, 4);
            return y === '2025' || y === '2026';
        }).length;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statInternational').textContent = intl;
        document.getElementById('statImplemented').textContent = implemented;
        document.getElementById('statNew').textContent = newCount;
    }

    function renderCharts(records) {
        // 1. 状态分布饼图
        var statusData = [];
        var statusGroups = {};
        records.forEach(function(r) {
            var s = r.status || 'unknown';
            statusGroups[s] = (statusGroups[s] || 0) + 1;
        });
        ['implemented', 'published', 'draft'].forEach(function(s) {
            if (statusGroups[s]) {
                statusData.push({ name: statusMap[s] || s, value: statusGroups[s] });
            }
        });
        var chartStatus = echarts.init(document.getElementById('chartStatus'));
        chartStatus.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: 0, textStyle: { fontSize: 11 } },
            color: ['#2e7d32', '#f57f17', '#7b1fa2'],
            series: [{
                type: 'pie',
                radius: ['38%', '65%'],
                center: ['50%', '45%'],
                avoidLabelOverlap: true,
                label: { show: true, formatter: '{b}\n{d}%', fontSize: 11 },
                emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
                data: statusData,
                itemStyle: { borderRadius: 4 }
            }]
        });

        // 2. 类型分布柱状图
        var typeData = [];
        var typeGroups = {};
        records.forEach(function(r) {
            var t = r.type || 'unknown';
            typeGroups[t] = (typeGroups[t] || 0) + 1;
        });
        ['national', 'international', 'industry', 'group'].forEach(function(t) {
            typeData.push({ name: typeMap[t] || t, value: typeGroups[t] || 0 });
        });
        var chartType = echarts.init(document.getElementById('chartType'));
        chartType.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: 50, right: 20, top: 20, bottom: 40 },
            xAxis: {
                type: 'category',
                data: typeData.map(function(d) { return d.name; }),
                axisLabel: { fontSize: 11 }
            },
            yAxis: {
                type: 'value',
                minInterval: 1,
                axisLabel: { fontSize: 11 }
            },
            color: ['#1565C0'],
            series: [{
                type: 'bar',
                barWidth: '45%',
                data: typeData.map(function(d) {
                    return {
                        value: d.value,
                        itemStyle: {
                            color: typeColorMap[['national','international','industry','group'][typeData.indexOf(d)]] || '#1565C0',
                            borderRadius: [4, 4, 0, 0]
                        }
                    };
                }),
                label: { show: true, position: 'top', fontSize: 11, fontWeight: 600 }
            }]
        });

        // 3. 年份趋势折线图
        var yearGroups = {};
        records.forEach(function(r) {
            var y = (r.date || '').slice(0, 4);
            if (y) yearGroups[y] = (yearGroups[y] || 0) + 1;
        });
        var years = Object.keys(yearGroups).sort();
        var yearValues = years.map(function(y) { return yearGroups[y]; });
        var chartYear = echarts.init(document.getElementById('chartYear'));
        chartYear.setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: 50, right: 20, top: 20, bottom: 40 },
            xAxis: {
                type: 'category',
                data: years,
                axisLabel: { fontSize: 11 }
            },
            yAxis: {
                type: 'value',
                minInterval: 1,
                axisLabel: { fontSize: 11 }
            },
            color: ['#00897B'],
            series: [{
                type: 'line',
                smooth: true,
                data: yearValues,
                symbol: 'circle',
                symbolSize: 8,
                lineStyle: { width: 3 },
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(0,137,123,0.35)' },
                            { offset: 1, color: 'rgba(0,137,123,0.02)' }
                        ]
                    }
                },
                label: { show: true, position: 'top', fontSize: 11, fontWeight: 600 }
            }]
        });

        // 4. 关联技术分布饼图
        var techGroups = {};
        records.forEach(function(r) {
            if (r.related_tech && r.related_tech.length) {
                r.related_tech.forEach(function(tech) {
                    techGroups[tech] = (techGroups[tech] || 0) + 1;
                });
            }
        });
        var techLabelMap = {
            'conductive-fiber': '导电纤维',
            'integration': '集成技术',
            'communication': '通信技术',
            'flexible-sensor': '柔性传感',
            'embedded-circuit': '嵌入式电路',
            'energy-harvesting': '能量采集'
        };
        var techData = Object.keys(techGroups).map(function(k) {
            return { name: techLabelMap[k] || k, value: techGroups[k] };
        }).sort(function(a, b) { return b.value - a.value; });

        var techColors = ['#1565C0', '#00897B', '#e67e22', '#8e44ad', '#27ae60', '#e74c3c', '#3498db', '#f39c12'];
        var chartTech = echarts.init(document.getElementById('chartTech'));
        chartTech.setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
            legend: { bottom: 0, textStyle: { fontSize: 11 } },
            color: techColors,
            series: [{
                type: 'pie',
                radius: ['38%', '65%'],
                center: ['50%', '45%'],
                avoidLabelOverlap: true,
                label: { show: true, formatter: '{b}\n{d}%', fontSize: 11 },
                emphasis: { label: { show: true, fontSize: 13, fontWeight: 'bold' } },
                data: techData,
                itemStyle: { borderRadius: 4 }
            }]
        });

        // Resize handling
        window.addEventListener('resize', function() {
            chartStatus.resize();
            chartType.resize();
            chartYear.resize();
            chartTech.resize();
        });
    }

    function renderList(records) {
        var listWrap = document.getElementById('listWrap');
        var countInfo = document.getElementById('countInfo');
        countInfo.textContent = '共 ' + records.length + ' 条';

        if (records.length === 0) {
            listWrap.innerHTML = '<div class="empty-msg">暂无匹配的标准数据</div>';
            return;
        }

        var html = '';
        records.forEach(function(r) {
            var typeLabel = typeMap[r.type] || r.type || '--';
            var statusLabel = statusMap[r.status] || r.status || '--';
            var statusClass = r.status === 'implemented' ? 'status-implemented' : (r.status === 'published' ? 'status-pending' : 'status-draft');

            html += '<div class="std-card">';
            html += '<h3>' + (r.title || '') + '</h3>';
            if (r.code) html += '<div class="code">📄 ' + r.code + '</div>';
            html += '<div class="meta-row">';
            html += '<span class="tag green">' + typeLabel + '</span>';
            if (r.organization) html += '<span class="tag purple">' + r.organization + '</span>';
            html += '</div>';
            if (r.summary) html += '<div class="summary">' + r.summary + '</div>';
            html += '<div class="bottom-row">';
            html += '<span class="date">📅 ' + (r.date || '') + '</span>';
            html += '<span class="status-badge ' + statusClass + '">' + statusLabel + '</span>';
            html += '</div>';
            html += '</div>';
        });
        listWrap.innerHTML = html;
    }

    if (typeof window.STANDARDS_DATA !== 'undefined') {
        init();
    } else {
        var ci = setInterval(function() {
            if (typeof window.STANDARDS_DATA !== 'undefined') {
                clearInterval(ci);
                init();
            }
        }, 100);
        setTimeout(function() { clearInterval(ci); document.getElementById('listWrap').innerHTML = '<div class="error-msg">❌ 数据加载超时</div>'; }, 5000);
    }
})();
</script>
</body>
</html>
